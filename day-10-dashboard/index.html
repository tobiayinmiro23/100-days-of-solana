    <!DOCTYPE html>
<html>
<head>
  <title>Solana Dashboard</title>
  <style>
    body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 40px auto;
        padding: 0 20px;
        background: #1a1a2e;
        color: #e0e0e0;
      }
      h1 { color: #00ffa3; }
      input {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        font-family: monospace;
        border: 1px solid #333;
        border-radius: 4px;
        background: #16213e;
        color: #e0e0e0;
        box-sizing: border-box;
      }
      button {
        margin-top: 10px;
        padding: 10px 20px;
        background: #00ffa3;
        color: #1a1a2e;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover { background: #00cc82; }
      .balance { font-size: 24px; margin: 20px 0; }
      .tx {
        background: #16213e;
        padding: 12px;
        margin: 8px 0;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
        word-break: break-all;
      }
      .tx .status { color: #00ffa3; }
      .tx .status.failed { color: #ff4444; }
      #error { color: #ff4444; margin: 10px 0; }
      #loading { color: #888; margin: 10px 0; }
    
  
  </style>
</head>
<body>

<h1>Solana Devnet Dashboard</h1>

<input id="addressInput" />
<button id="fetchBtn">Fetch Data</button>

<div id="loading"></div>
<div id="error"></div>
<div id="results"></div>

<script type="module" src="./src/main.js"></script>

</body>
</html>
